name: DevForge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-build:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: auth, context: auth }
          - { name: ai-orchestration, context: ai-orchestration }
          - { name: notification, context: notification }
          - { name: sandbox-server, context: sandbox/server }
          - { name: sandbox-router, context: sandbox/router }
          - { name: sandbox-agent, context: sandbox/agent }
          - { name: sandbox-template, context: sandbox/template }
          - { name: sync-agent, context: sandbox/sync-agent }
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service.name }}
        run: docker build -t devforge-${{ matrix.service.name }}:ci ./${{ matrix.service.context }}
